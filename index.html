<!DOCTYPE html>
<html>
<head>
    <title>라디오는 사연을 싣고</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    
    <link rel="icon" type="image/png" href="https://i.imgur.com/xgjafB5.png">
    <link rel="shortcut icon" href="https://i.imgur.com/xgjafB5.png">
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>

<style>
    @font-face {
        font-family: 'DungGeunMo';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
    }

    :root {
        --dark-wood: #4B2F2A;
        --mid-wood: #6D4C41;
        --dial-color: #F5DEB3;
        --panel-bg: #88624E;
        --screen-bg: rgba(255, 255, 255, 0.95);
        --font-color: #333;
        --gowun-dodum: 'Gowun Dodum', sans-serif;
        --retro-font: 'DungGeunMo', monospace;
        --error-color: var(--dark-wood);
        --scrollDur: 57s;
    }

    body {
        font-family: var(--gowun-dodum);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100dvh;
        background-color: #f4f4f4;
        transition: background-color 0.5s;
    }

    h1, h2, h3, p, div, span, button, li, table, a, select, textarea, input {
        font-family: var(--gowun-dodum) !important;
    }

    .main-content > p { font-size: 1.1em; }
    .main-content h3 { font-size: 1.3em; font-weight: normal; }

    .radio-wrapper {
        position: relative;
        width: min(95vw, 800px);
        aspect-ratio: 4 / 3;
        max-height: min(85vh, 600px);
        height: auto;
        padding-top: 0;
        box-sizing: content-box;
    }

    .radio-container {
        width: 100%;
        height: 100%;
        background-color: var(--mid-wood);
        border-radius: 20px;
        box-shadow: 0 0 0 15px var(--dark-wood),
                    10px 10px 30px rgba(0, 0, 0, 0.5);
        position: relative;
        display: flex;
        flex-direction: column;
        padding: 20px;
        box-sizing: border-box;
        color: var(--font-color);
        transition: all 0.5s;
        z-index: 10;
    }

    .radio-screen {
        flex: 1;
        background-color: var(--screen-bg);
        border-radius: 5px;
        overflow-y: auto;
        position: relative;
        margin-bottom: 20px;
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: 15px;
    }

    .main-content {
        flex-grow: 1;
        width: 100%;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }

    .main-content h2 {
        border-bottom: 2px solid var(--panel-bg);
        padding-bottom: 10px;
        margin-bottom: 15px;
    }

    .main-content .menu-wrapper {
        display: flex;
        justify-content: space-around;
        gap: 20px;
        width: 100%;
        margin-top: 15px;
    }

    .main-content .menu-item-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1 1 30%;
        min-width: 180px;
        text-align: center;
        margin: 0;
    }

    .main-content .menu-item-wrapper > button {
        width: 100%;
        max-width: 250px;
        padding: 15px 15px !important;
        font-size: 1.1em !important;
        font-weight: normal;
        margin-bottom: 5px;
        border-radius: 8px;
        background-color: var(--dial-color);
        color: var(--dark-wood);
        border: 2px solid var(--panel-bg);
        font-family: var(--gowun-dodum) !important;
    }

    .main-content .menu-item-wrapper > p {
        font-size: 0.85em;
        margin: 0;
        line-height: 1.3;
    }

    .qr-pin-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px; 
        margin-top: 20px;
        flex-wrap: wrap; 
        height: 100%;
    }

    .qr-section, .pin-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .pin-label {
        font-size: 1.4em;
        font-weight: bold;
        color: var(--dark-wood);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .pin-input-large {
        font-family: var(--gowun-dodum) !important; 
        font-size: 5em;
        width: 380px;
        text-align: center;
        background-color: #ffffff; 
        color: var(--dark-wood); 
        border: 4px solid #cccccc; 
        border-radius: 12px;
        padding: 10px;
        letter-spacing: 4px; 
        box-shadow: none; 
        box-sizing: border-box; 
    }
    
    .pin-input-large::placeholder {
        color: #aaaaaa; 
    }

    .pin-input-large:focus {
        outline: none;
        border-color: #88624E; 
        box-shadow: 0 0 10px rgba(136, 98, 78, 0.2);
    }

    .qr-size {
        width: 160px !important;
        height: 160px !important;
        max-width: 160px;
        max-height: 160px;
        background-color: white;
        padding: 15px;
        border: 1px solid #333;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }

@media (max-width: 768px), (max-aspect-ratio: 3/4) {
    body {
        padding: 16px 14px;
    }

    .radio-wrapper {
        width: 100%;
        height: 92dvh;
        height: 92svh;
        max-height: 92dvh;
        aspect-ratio: auto;
        padding: 0 12px;
        box-sizing: border-box;
    }

    .radio-container {
        height: 100%;
        grid-template-rows: 6fr 4fr;
        padding: 14px;
        box-shadow: 0 0 0 8px var(--dark-wood), 4px 4px 12px rgba(0,0,0,.4);
    }

    .radio-screen {
        min-height: 0;
        max-height: 100%;
        overflow-y: auto;
        position: relative;       margin-bottom: 10px;
        padding: 10px 10px 12px;
    }

    .control-panel {
        flex-direction: column;
        padding: 10px;
    }

        .control-panel > .dial-control {
            display: none;
        }

        .dial-button-group {
            display: flex !important;
            order: 2;
            width: 100%;
            justify-content: space-around;
            margin-bottom: 10px;
        }

        .dial-button-group .dial-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .dial-button-group .radio-dial,
        .radio-dial {
            width: 72px;
            height: 72px;
            font-size: .9em;
            margin: 5px auto;
        }

        .frequency-area {
            order: 1;
            width: 95%;
            padding: 5px 0;
        }

        .center-buttons {
            order: 3;
            width: 100%;
            justify-content: space-around;
            margin-top: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
        }

        .center-buttons button {
            font-size: 0.9em;
            padding: 10px 5px;
            border-radius: 8px !important;
            min-height: 44px;
        }

        .story-player-area {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
        }

        .story-scroll-container {
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
        }

        .youtube-panel {
            width: 100%;
            min-height: 0;
        }

        .youtube-box {
            height: auto;
            padding: 0;
        }

        .main-content .menu-wrapper {
            flex-direction: column;
            gap: 10px;
        }

        .main-content .menu-item-wrapper {
            width: 100%;
            margin: 5px 0;
        }

        .main-content .menu-item-wrapper > p {
            text-align: left;
        }

        .app-footer {
            display: none;
        }

        .pin-input-large {
            font-size: 2.8em;
            width: 220px;
            padding: 5px;
            border-width: 3px;
        }
        .qr-size {
            width: 160px !important;
            height: 160px !important;
        }
        .qr-pin-container {
            gap: 20px;
            flex-direction: column; 
            justify-content: flex-start;
            padding-top: 10px;
        }

        @media (max-width: 360px) {
            .qr-size {
                width: 140px !important;
                height: 140px !important;
            }
        }
    }

    #searchResults {
        list-style: none;
        padding: 5px 0 0 0;
        margin: 0;
    }
    #searchResults li {
        padding: 5px 10px;
        border-radius: 5px;
        margin-top: 5px;
        cursor: pointer;
        background-color: rgba(255, 255, 255, 0.7);
        border: 1px dashed var(--panel-bg);
        font-size: 0.9em;
    }
    #searchResults li:hover {
        background-color: var(--dial-color);
    }

    .story-player-area {
        display: flex; 
        flex-grow: 1;
        width: 100%;
        min-height: 300px;
    }

    .scroll-text-box {
        flex: 3; 
        overflow-y: hidden;
        position: relative;
        padding: 10px;
        padding-right: 20px;
        padding-left: 5px;
        border-right: 1px solid #ccc;
        height: 100%;
        display: flex;
        flex-direction: column;
    }

    .story-text-scrolling {
        position: absolute;
        width: 100%;
        color: var(--dark-wood);
        text-align: center;
        top: 100%;
        left: -10px;
        padding: 0 14px;
        white-space: pre-wrap;
        animation: scrollUp var(--scrollDur) linear forwards;
    }

    .story-text-scrolling.size-small { font-size: 1.2em; }
    .story-text-scrolling.size-large { font-size: 2.4em; }

    @keyframes scrollUp {
        0% { transform: translateY(0); }
        100% { transform: translateY(-2000px); }
    }

    .scroll-text-box h2,
    .scroll-text-box p#playerArea {
        flex-shrink: 0;
        margin-top: 5px;
        margin-bottom: 5px;
    }

    .story-scroll-container {
        flex-grow: 1;
        overflow: hidden;
        position: relative;
        padding: 10px 0;
    }

    .youtube-panel {
        flex: 2; 
        display: flex;
        flex-direction: column;
        padding: 10px;
        height: 100%;
    }

    .youtube-box {
        position: relative;
        flex-grow: 1;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        width: 100%;
        aspect-ratio: 16 / 9;
        transition: opacity 0.3s;
    }
    #youtubePlayer,
    #youtubePlayer iframe {
        width: 100%;
        height: 100%;
        max-height: 100%;
        z-index: 1;
        display: block;
    }

    .playback-controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }

.icon-button.is-on {
    background-color: var(--dial-color);
    color: var(--dark-wood);
}

    .icon-button {
        background-color: var(--dark-wood);
        color: var(--dial-color);
        border: 2px solid var(--panel-bg);
        border-radius: 5px;
        width: 40px;
        height: 40px;
        font-size: 1.5em;
        line-height: 1;
        text-align: center;
        cursor: pointer;
        transition: background-color 0.1s;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .icon-button:hover { background-color: #331f1d; }
    .icon-button[title="랜덤 재생"] { font-family: Arial, sans-serif !important; }

    .font-toggle {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        margin-left: 12px;
    }
    .font-btn {
        min-width: 36px;
        height: 36px;
        border: 2px solid var(--panel-bg);
        border-radius: 5px;
        background: #fff;
        color: var(--dark-wood);
        font-weight: 700;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 8px;
        transition: background-color .15s ease, transform .05s ease;
        font-family: var(--gowun-dodum) !important;
    }
    .font-btn:active { transform: scale(0.98); }
    .font-btn.active { background: var(--dial-color); }

    .form-group { margin-bottom: 15px; }
    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: var(--dark-wood);
        font-size: 1.1em;
    }

    .form-group input[type="text"],
    .form-group input[type="email"],
    .form-group input[type="password"],
    .form-group textarea,
    .status-select {
        width: 100%;
        padding: 12px;
        font-size: 1.1em;
        font-family: var(--gowun-dodum) !important;
        background-color: var(--dial-color);
        color: var(--dark-wood);
        border: 2px solid var(--panel-bg);
        border-radius: 4px;
        box-sizing: border-box;
    }

    .center-buttons {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-top: 15px;
        align-self: center;
    }
    .center-buttons button {
        flex-grow: 0;
        width: auto;
        padding: 8px 15px;
        background-color: var(--dial-color);
        color: var(--dark-wood);
        border: 2px solid var(--panel-bg);
        border-radius: 8px;
        font-size: 0.9em;
        font-family: var(--gowun-dodum) !important;
        font-weight: normal;
        cursor: pointer;
    }

    .main-content button[type="submit"],
    .modal-button {
        padding: 10px 20px;
        background-color: var(--dark-wood);
        color: var(--dial-color);
        border: 2px solid var(--panel-bg);
        border-radius: 8px;
        font-size: 1.1em;
        font-weight: normal;
        cursor: pointer;
        transition: background-color 0.1s;
        margin-top: 10px;
        margin-bottom: 20px;
        width: auto;
        display: block;
        margin-left: 0;
        margin-right: auto;
        box-sizing: border-box;
        font-family: var(--gowun-dodum) !important;
    }
    .modal-button {
        width: 100%;
        display: block;
        margin-left: auto;
        margin-right: auto;
        margin-bottom: 0;
    }
    .main-content button[type="submit"]:hover,
    .modal-button:hover { background-color: #331f1d; }

    #writeForm button[type="button"] {
        padding: 8px 15px;
        font-size: 1.1em;
        background-color: var(--panel-bg);
        color: white;
        border-radius: 8px;
        width: auto !important;
        display: inline-block;
        border: none;
        margin-top: 5px;
        font-weight: normal;
        font-family: var(--gowun-dodum) !important;
    }

    .modal-content {
        background-color: var(--screen-bg);
        border: 8px solid var(--dark-wood);
        border-radius: 15px;
        padding: 30px;
        width: min(92vw, 420px);
        text-align: center;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        font-family: var(--gowun-dodum);
    }

    .modal-overlay {
        position: fixed !important;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }
    .modal-overlay.show { display: flex !important; }

    .modal-content h3 {
        color: var(--dark-wood);
        font-size: 1.5em;
        border-bottom: 2px dashed var(--panel-bg);
        padding-bottom: 10px;
        margin-top: 0;
    }
    .modal-content strong {
        color: #d90000;
        font-size: 1.2em;
        display: block;
        padding: 5px 0;
        font-family: var(--gowun-dodum);
        font-weight: normal;
    }

    .control-panel {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: var(--panel-bg);
        border: 2px solid var(--dark-wood);
        border-radius: 5px;
        padding: 15px;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
    }
    .dial-control {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-shrink: 0;
        width: 100px;
        margin: 0 10px;
    }
    .dial-button-group { display: none; }

    .radio-dial {
        width: 70px;
        height: 70px;
        background-color: var(--dial-color);
        border: 4px solid var(--dark-wood);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        text-align: center;
        cursor: pointer;
        box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3), inset 0 0 3px rgba(0, 0, 0, 0.5);
        transition: all 0.1s;
        padding: 5px;
        box-sizing: border-box;
        line-height: 1.2;
        font-size: 0.85em;
        font-family: var(--gowun-dodum) !important;
    }
    .radio-dial:hover { background-color: #fff8e8; }
    .dummy-dial-label {
        font-size: 0.7em;
        color: var(--dial-color);
        margin-top: 5px;
        text-transform: uppercase;
    }

    .frequency-area {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 10px;
    }
    .frequency-display-inner {
        position: relative;
        width: 90%;
        height: 30px;
        background-color: #333;
        border: 1px solid #000;
        border-radius: 3px;
        text-align: center;
        line-height: 30px;
        font-size: 0.9em;
        color: #FFD700;
        font-family: var(--retro-font) !important;
        box-shadow: inset 0 0 5px rgba(255, 215, 0, 0.5);
        overflow: hidden;
    }

    .app-footer {
        margin-top: 20px;
        color: #aaaaaa;
        font-size: 0.8em;
        font-family: var(--gowun-dodum);
    }

    .story-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9em;
        border: 1px solid #ddd;
    }
    .story-table th,
    .story-table td {
        border: 1px solid #ddd;
        padding: 10px 8px;
        text-align: left;
        font-family: var(--gowun-dodum) !important;
    }
    .story-table td[title] { cursor: help; }

    .button-group button {
        background-color: var(--dark-wood) !important;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px 15px !important;
        margin-right: 0 !important;
        width: 100%;
        text-align: center;
        transition: background-color 0.1s;
        font-size: 1.1em;
        font-weight: normal;
        font-family: var(--gowun-dodum) !important;
    }
    .button-group button:hover { background-color: #331f1d !important; }

    .story-table td[class^="status-"] {
        font-weight: 700;
        text-align: center;
        border-left: 4px solid transparent;
        transition: background-color .2s ease, box-shadow .2s ease, color .2s ease;
    }
    .story-table td.status-approved { color: #0f5132; text-shadow: 0 0 6px rgba(25,135,84,0.45); }
    .story-table td.status-pending { color: #664d03; text-shadow: 0 0 6px rgba(255,193,7,0.5); }
    .story-table td.status-rejected { color: #842029; text-shadow: 0 0 6px rgba(220,53,69,0.45); }

    .youtube-box { position: relative; }

    .youtube-box::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(244,244,244,0.99);
        z-index: 2;
        display: grid;
        place-items: center;
        text-align: center;
        font-size: 0.95em;
        color: #333;
        padding: 10px 16px;
        border-radius: 6px;
        transition: opacity .2s ease;
        opacity: 1;
    }

    .youtube-box:hover::after,
    .youtube-box:focus-within::after {
        opacity: 0;
        pointer-events: none;
    }

    @media (hover: none) and (pointer: coarse) {
        .youtube-box::after {
            opacity: 0;
            pointer-events: none;
        }
    }

    .email-error-inline {
        margin-top: 4px;
        color: #c62828;
        font-size: 0.9em;
        display: none;
    }
    .email-error-inline.show {
        display: block;
    }
@media (max-width: 480px) {
    .frequency-area {
        width: 100%;
    }

    .center-buttons {
        display: flex; 
        flex-wrap: nowrap; 
        gap: 6px;
        justify-content: center;
    }

    .center-buttons button {
        flex: 0 1 auto; 
        min-width: 70px;  
        padding: 6px 4px;  
        font-size: 0.78rem; 
        line-height: 1.1;
        border-radius: 6px !important;
    }

    .frequency-display-inner {
        width: 100%;
        margin-bottom: 6px;
    }
}

@media (max-width: 360px) {
    .center-buttons {
        gap: 4px;
    }
    .center-buttons button {
        min-width: 64px;
        font-size: 0.7rem;
        padding: 5px 3px;
    }
}
</style>

</head>
<body>

    <div class="radio-wrapper">
        <div class="radio-container">

            <div class="radio-screen" id="radioScreen">
                <div class="main-content" id="mainContent">
                    <h2 class="content-title">📻 라디오는 사연을 싣고 💌</h2>
                    <p>아래 다이얼을 눌러 원하는 기능을 선택하세요!</p>
                    <p>📝 사연 쓰기 : 사연을 적고 신청곡과 함께 보낼 수 있어요.</p>
                    <p>🔑 사연 관리 : 채널을 개설하고 사연을 불러올 수 있어요.</p>
                </div>
            </div>

            <div class="control-panel">

                <div class="dial-control">
                    <div class="radio-dial" onclick="loadContent('write')">사연<br>쓰기</div>
                    <div class="dummy-dial-label">VOLUME</div>
                </div>

                <div class="dial-button-group">
                    <div class="dial-control">
                        <div class="radio-dial" onclick="loadContent('write')">사연<br>쓰기</div>
                        <div class="dummy-dial-label">VOLUME</div>
